  function renderPermContentList(targetId) {
    const listArea = document.getElementById('permContentList');
    
    const db = getDbSync();
    const allUsers = Object.keys(db.users);
    const rootUser = allUsers.find(u => db.users[u]?.role === 'root');
    if (!rootUser) {
      listArea.innerHTML = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">未找到超级账号数据</div>';
      return;
    }
    
    const currentRole = state.currentUser && db.users[state.currentUser]?.role;
    const leaderGroup = (currentRole !== 'root' && currentRole !== 'admin') ? getLeaderGroup() : null;
    const rootData = db.userData[rootUser] || {};
    const perms = rootData.permissions?.[targetId] || { categories: [], bookmarks: [] };
    const isGroupMode = targetId.startsWith('group:');
    const groupId = isGroupMode ? targetId.replace('group:', '') : null;
    
    let allowedCats, allowedBms;
    if (currentRole === 'root') {
      allowedCats = rootData.categories || [];
      allowedBms = rootData.bookmarks || [];
    } else if (currentRole === 'admin') {
      const adminPerms = rootData.permissions?.[state.currentUser] || {};
      const adminCatIds = adminPerms.allow?.categories || adminPerms.categories || [];
      const adminBmIds = adminPerms.allow?.bookmarks || adminPerms.bookmarks || [];
      allowedCats = (rootData.categories || []).filter(c => adminCatIds.includes(c.id));
      allowedBms = (rootData.bookmarks || []).filter(b => adminBmIds.includes(b.id));
    } else if (leaderGroup) {
      const gp = rootData.permissions?.['group:' + leaderGroup.id] || {};
      const groupCatIds = gp.categories || [];
      const groupBmIds = gp.bookmarks || [];
      allowedCats = (rootData.categories || []).filter(c => groupCatIds.includes(c.id));
      allowedBms = (rootData.bookmarks || []).filter(b => groupBmIds.includes(b.id));
    } else {
      allowedCats = [];
      allowedBms = [];
    }
    
    let html = '';
    
    function getPermState(itemId, itemType) {
      const userPerms = perms;
      if (isGroupMode) {
        const catList = userPerms.categories || [];
        const bmList = userPerms.bookmarks || [];
        return itemType === 'category' ? (catList.includes(itemId) ? 'allow' : 'default') : (bmList.includes(itemId) ? 'allow' : 'default');
      }
      if (userPerms.allow || userPerms.deny) {
        const al = userPerms.allow || {};
        const dl = userPerms.deny || {};
        const allowList = itemType === 'category' ? (al.categories || []) : (al.bookmarks || []);
        const denyList = itemType === 'category' ? (dl.categories || []) : (dl.bookmarks || []);
        if (denyList.includes(itemId)) return 'deny';
        if (allowList.includes(itemId)) return 'allow';
      } else {
        const catList = userPerms.categories || [];
        const bmList = userPerms.bookmarks || [];
        return itemType === 'category' ? (catList.includes(itemId) ? 'allow' : 'default') : (bmList.includes(itemId) ? 'allow' : 'default');
      }
      const userGroups = db.users[targetId]?.groups || [];
      for (const gid of userGroups) {
        const gp = rootData.permissions?.['group:' + gid];
        if (gp) {
          const gList = itemType === 'category' ? (gp.categories || []) : (gp.bookmarks || []);
          if (gList.includes(itemId)) return 'inherit';
        }
      }
      return 'default';
    }
    
    function renderItem(item, itemType, icon, label) {
      const state = getPermState(item.id, itemType);
      let stateLabel = '';
      let stateColor = '';
      if (state === 'inherit') { stateLabel = '继承'; stateColor = '#4caf50'; }
      else if (state === 'allow') { stateLabel = '额外添加'; stateColor = '#81c784'; }
      else if (state === 'deny') { stateLabel = '已禁止'; stateColor = '#e06060'; }
      else { stateLabel = '未继承'; stateColor = 'var(--text-muted)'; }
      
      let actionHtml = '';
      if (isGroupMode) {
        const checked = state === 'allow';
        actionHtml = `<input type="checkbox" class="perm-checkbox" data-type="${itemType}" data-id="${item.id}" ${checked ? 'checked' : ''} style="margin-right:10px;cursor:pointer;accent-color:var(--accent)">`;
      } else {
        actionHtml = `<span style="font-size:11px;color:${stateColor};min-width:50px">${stateLabel}</span>`;
        if (!leaderGroup) {
          actionHtml += `<button class="nav-btn" data-action="allow" data-type="${itemType}" data-id="${item.id}" onclick="togglePermState(this,'${itemType}','${item.id}')" style="color:${state === 'allow' ? 'var(--accent)' : 'var(--text-muted)'};font-weight:${state === 'allow' ? '600' : 'normal'}">✓ 允许</button>`;
        }
        actionHtml += `<button class="nav-btn" data-action="deny" data-type="${itemType}" data-id="${item.id}" onclick="togglePermState(this,'${itemType}','${item.id}')" style="color:${state === 'deny' ? 'var(--danger)' : 'var(--text-muted)'};font-weight:${state === 'deny' ? '600' : 'normal'}">✕ 禁止</button>`;
      }
      
      return `<div class="perm-item" data-type="${itemType}" data-id="${item.id}" data-state="${state}" style="display:flex;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);gap:6px">
        ${actionHtml}
        <span style="flex:1;font-size:13px;color:var(--text-primary)">${icon} ${label}</span>
      </div>`;
    }
    
    if (allowedCats.length > 0) {
      html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;font-weight:500">📁 分类</div>';
      allowedCats.forEach(cat => {
        html += renderItem(cat, 'category', '📁', cat.name);
      });
    }
    
    if (allowedBms.length > 0) {
      html += '<div style="font-size:12px;color:var(--text-muted);margin:12px 0 8px;font-weight:500">🔗 收藏</div>';
      allowedBms.forEach(bm => {
        html += renderItem(bm, 'bookmark', '🔗', bm.name);
      });
    }
    
    if (allowedCats.length === 0 && allowedBms.length === 0) {
      html = '<div style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px">暂无内容可管理</div>';
    }
    
    listArea.innerHTML = html;
  }

  function togglePermState(btn, itemType, itemId) {
    const action = btn.dataset.action;
    const parent = btn.closest('.perm-item');
    const currentState = parent.dataset.state;
    let newState;
    if (action === 'allow') {
      newState = currentState === 'allow' ? 'default' : 'allow';
    } else {
      newState = currentState === 'deny' ? 'default' : 'deny';
    }
    if (newState === 'allow' && currentState === 'deny') {
      const denyBtn = parent.querySelector('[data-action="deny"]');
      if (denyBtn) denyBtn.style.color = 'var(--text-muted)';
      if (denyBtn) denyBtn.style.fontWeight = 'normal';
    }
    if (newState === 'deny' && currentState === 'allow') {
      const allowBtn = parent.querySelector('[data-action="allow"]');
      if (allowBtn) allowBtn.style.color = 'var(--text-muted)';
      if (allowBtn) allowBtn.style.fontWeight = 'normal';
    }
    parent.dataset.state = newState;
    if (newState === 'allow') {
      btn.style.color = 'var(--accent)';
      btn.style.fontWeight = '600';
      const denyBtn = parent.querySelector('[data-action="deny"]');
      if (denyBtn) { denyBtn.style.color = 'var(--text-muted)'; denyBtn.style.fontWeight = 'normal'; }
    } else if (newState === 'deny') {
      btn.style.color = 'var(--danger)';
      btn.style.fontWeight = '600';
      const allowBtn = parent.querySelector('[data-action="allow"]');
      if (allowBtn) { allowBtn.style.color = 'var(--text-muted)'; allowBtn.style.fontWeight = 'normal'; }
    } else {
      btn.style.color = 'var(--text-muted)';
      btn.style.fontWeight = 'normal';
    }
    const stateLabel = parent.querySelector('span:first-child');
    if (stateLabel && stateLabel.textContent.match(/继承|额外添加|已禁止|未继承/)) {
      if (newState === 'allow') { stateLabel.textContent = '额外添加'; stateLabel.style.color = '#81c784'; }
      else if (newState === 'deny') { stateLabel.textContent = '已禁止'; stateLabel.style.color = '#e06060'; }
      else {
        const db = getDbSync();
        const targetId = currentPermMode === 'group' ? 'group:' + selectedPermGroupId : (leaderGroupForMgr ? currentPermTarget : document.getElementById('permAccountSelect').value);
        const userGroups = db.users[targetId]?.groups || [];
        const rootUser = Object.keys(db.users).find(u => db.users[u]?.role === 'root');
        const rootData = rootUser ? db.userData[rootUser] : {};
        let inherited = false;
        for (const gid of userGroups) {
          const gp = rootData.permissions?.['group:' + gid];
          if (gp) {
            const gList = itemType === 'category' ? (gp.categories || []) : (gp.bookmarks || []);
            if (gList.includes(itemId)) { inherited = true; break; }
          }
        }
        stateLabel.textContent = inherited ? '继承' : '未继承';
        stateLabel.style.color = inherited ? '#4caf50' : 'var(--text-muted)';
      }
    }
  }

  function selectAllPerms() {
    if (currentPermMode === 'group') {
      document.querySelectorAll('.perm-checkbox').forEach(cb => cb.checked = true);
    } else {
      document.querySelectorAll('.perm-item[data-state="default"], .perm-item[data-state="inherit"]').forEach(item => {
        togglePermState(item.querySelector('[data-action="allow"]'), item.dataset.type, item.dataset.id);
      });
      document.querySelectorAll('.perm-item[data-state="deny"]').forEach(item => {
        togglePermState(item.querySelector('[data-action="deny"]'), item.dataset.type, item.dataset.id);
      });
    }
  }

  function clearAllPerms() {
    if (currentPermMode === 'group') {
      document.querySelectorAll('.perm-checkbox').forEach(cb => cb.checked = false);
    } else {
      document.querySelectorAll('.perm-item[data-state="allow"]').forEach(item => {
        togglePermState(item.querySelector('[data-action="allow"]'), item.dataset.type, item.dataset.id);
      });
      document.querySelectorAll('.perm-item[data-state="inherit"], .perm-item[data-state="default"]').forEach(item => {
        if (item.dataset.state === 'inherit' || item.dataset.state === 'default') {
          togglePermState(item.querySelector('[data-action="deny"]'), item.dataset.type, item.dataset.id);
        }
      });
    }
  }

  function savePermissions() {
    const db = getDbSync();
    
    const currentUser = state.currentUser;
    const currentRole = currentUser && db.users[currentUser]?.role;
    const leaderGroup = (currentRole !== 'root' && currentRole !== 'admin') ? getLeaderGroup() : null;
    if (currentRole !== 'root' && currentRole !== 'admin' && !leaderGroup) {
      showToast('请使用超级账号或管理员账号操作');
      return;
    }
    
    const allUsers = Object.keys(db.users);
    const rootUser = allUsers.find(u => db.users[u]?.role === 'root');
    if (!rootUser) {
      showToast('找不到超级账号');
      return;
    }
    if (!db.userData[rootUser]) db.userData[rootUser] = { categories: [], bookmarks: [] };
    if (!db.userData[rootUser].permissions) db.userData[rootUser].permissions = {};
    
    let adminCatSet, adminBmSet;
    if (currentRole === 'admin') {
      const adminPerms = db.userData[rootUser].permissions?.[currentUser] || {};
      const adminCatIds = adminPerms.allow?.categories || adminPerms.categories || [];
      const adminBmIds = adminPerms.allow?.bookmarks || adminPerms.bookmarks || [];
      adminCatSet = new Set(adminCatIds);
      adminBmSet = new Set(adminBmIds);
    }
    
    if (currentPermMode === 'group') {
      if (!selectedPermGroupId) { showToast('请先选择一个分组'); return; }
      const targetKey = 'group:' + selectedPermGroupId;
      const checkedCatIds = [];
      const checkedBmIds = [];
      document.querySelectorAll('.perm-checkbox:checked').forEach(cb => {
        if (cb.dataset.type === 'category') checkedCatIds.push(cb.dataset.id);
        else if (cb.dataset.type === 'bookmark') checkedBmIds.push(cb.dataset.id);
      });
      db.userData[rootUser].permissions[targetKey] = {
        categories: checkedCatIds,
        bookmarks: checkedBmIds
      };
    } else {
      const targetValue = (leaderGroupForMgr && currentPermTarget) ? currentPermTarget : document.getElementById('permAccountSelect').value;
      const allowCats = [];
      const allowBms = [];
      const denyCats = [];
      const denyBms = [];
      document.querySelectorAll('.perm-item').forEach(item => {
        const state = item.dataset.state;
        const type = item.dataset.type;
        const id = item.dataset.id;
        if (state === 'allow') {
          if (type === 'category') allowCats.push(id);
          else allowBms.push(id);
        } else if (state === 'deny') {
          if (type === 'category') denyCats.push(id);
          else denyBms.push(id);
        }
      });
      if (currentRole === 'admin' || leaderGroup) {
        const scopePerms = leaderGroup
          ? (db.userData[rootUser].permissions?.['group:' + leaderGroup.id] || {})
          : (db.userData[rootUser].permissions?.[currentUser] || {});
        const scopeCatIds = leaderGroup
          ? (scopePerms.categories || [])
          : (scopePerms.allow?.categories || scopePerms.categories || []);
        const scopeBmIds = leaderGroup
          ? (scopePerms.bookmarks || [])
          : (scopePerms.allow?.bookmarks || scopePerms.bookmarks || []);
        adminCatSet = new Set(scopeCatIds);
        adminBmSet = new Set(scopeBmIds);
        for (let i = allowCats.length - 1; i >= 0; i--) {
          if (!adminCatSet.has(allowCats[i])) allowCats.splice(i, 1);
        }
        for (let i = allowBms.length - 1; i >= 0; i--) {
          if (!adminBmSet.has(allowBms[i])) allowBms.splice(i, 1);
        }
        for (let i = denyCats.length - 1; i >= 0; i--) {
          if (!adminCatSet.has(denyCats[i])) denyCats.splice(i, 1);
        }
        for (let i = denyBms.length - 1; i >= 0; i--) {
          if (!adminBmSet.has(denyBms[i])) denyBms.splice(i, 1);
        }
      }
      db.userData[rootUser].permissions[targetValue] = {
        allow: { categories: allowCats, bookmarks: allowBms },
        deny:  { categories: denyCats,  bookmarks: denyBms  }
      };
    }
    
    // 清除缓存并保存到云端
    cachedDb = null;
    saveDb(db).then(() => {
      const currentDb = getDbSync();
      const rd = currentDb.userData[rootUser] || {};
      state.groups = rd.groups || [];
      
      if (currentRole === 'root') {
        state.categories = rd.categories || [];
        state.bookmarks = rd.bookmarks || [];
      } else {
        const fp = getUserFinalPermissions(currentUser);
        state.categories = fp.categories;
        state.bookmarks = fp.bookmarks;
      }
      renderCategories();
      renderBookmarks();
    });
    
    closeModal('permissionMgrModal');
    showToast('权限已保存');
  }

  function showResetPasswordModal() {
    document.getElementById('resetUsernameInput').value = '';
    document.getElementById('resetAnswerInput').value = '';
    document.getElementById('resetNewPwdInput').value = '';
    document.getElementById('resetQuestionArea').style.display = 'none';
    document.getElementById('resetPwdConfirmBtn').textContent = '下一步';
    document.getElementById('resetPwdConfirmBtn').onclick = showResetQuestion;
    document.getElementById('resetError').style.display = 'none';
    closePasswordModal();
    document.getElementById('resetPwdModal').classList.add('show');
    setTimeout(() => document.getElementById('resetUsernameInput').focus(), 100);
  }

  function showResetQuestion() {
    const username = document.getElementById('resetUsernameInput').value.trim();
    const db = getDbSync();
    const resetError = document.getElementById('resetError');

    if (!username) {
      resetError.textContent = '请输入账号';
      resetError.style.display = '';
      return;
    }

    if (!db.users[username]) {
      resetError.textContent = '账号不存在';
      resetError.style.display = '';
      return;
    }

    const questionArea = document.getElementById('resetQuestionArea');
    if (questionArea.style.display === 'none' || !questionArea.style.display) {
      document.getElementById('resetQuestionText').textContent = db.users[username].securityQ || '（账号早期创建无密保问题）';
      questionArea.style.display = '';
      document.getElementById('resetPwdConfirmBtn').textContent = '重置密码';
      document.getElementById('resetPwdConfirmBtn').onclick = confirmResetPassword;
      resetError.style.display = 'none';
    }
  }

  async function confirmResetPassword() {
    const username = document.getElementById('resetUsernameInput').value.trim();
    const answer = document.getElementById('resetAnswerInput').value.trim().toLowerCase();
    const newPwd = document.getElementById('resetNewPwdInput').value;
    const db = getDbSync();
    const resetError = document.getElementById('resetError');

    if (!answer) {
      resetError.textContent = '请输入密保答案';
      resetError.style.display = '';
      return;
    }
    if (!newPwd) {
      resetError.textContent = '请输入新密码';
      resetError.style.display = '';
      return;
    }

    const userData = db.users[username];
    if (!userData) {
      resetError.textContent = '账号不存在';
      resetError.style.display = '';
      return;
    }

    let answerMatch = false;
    if (userData.securityAHash) {
      // 新格式验证
      const answerHash = await hashText(answer);
      answerMatch = answerHash === userData.securityAHash;
    } else if (userData.securityA) {
      // 旧格式兼容
      const storedAnswer = userData.securityA;
      answerMatch = storedAnswer === answer;
      if (!answerMatch) {
        try {
          answerMatch = decodeStr(storedAnswer) === answer;
        } catch {}
      }
      if (answerMatch) {
        // 自动升级
        const newAnswerHash = await hashText(answer);
        userData.securityAHash = newAnswerHash;
        delete userData.securityA;
      }
    }

    if (answerMatch) {
      const pwdHash = await hashPassword(newPwd);
      userData.passwordHash = pwdHash.hash;
      userData.passwordSalt = pwdHash.salt;
      if (userData.password) delete userData.password;
      saveDb(db);
      document.getElementById('resetPwdModal').classList.remove('show');
      showPasswordModal();
      showToast('密码已重置，请使用新密码登录');
    } else {
      resetError.textContent = '密保答案错误';
      resetError.style.display = '';
    }
  }

  document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('show');
  });
  document.getElementById('sidebarOverlay').addEventListener('click', () => {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.querySelectorAll('.modal-overlay.show').forEach(el => el.classList.remove('show'));
      confirmCallback = null;
    }
    if (e.key === '?' && !e.ctrlKey && !e.metaKey) {
      e.preventDefault();
      showShortcuts();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
      e.preventDefault();
      const inp = document.getElementById('searchInput');
      inp.focus();
      inp.select();
    }
    if (e.key === 'e' && !e.ctrlKey && !e.metaKey && !e.target.closest('input,select,textarea')) {
      if (document.body.classList.contains('editing')) {
        document.body.classList.remove('editing');
        const btn = document.getElementById('editToggleBtn');
        btn.textContent = '✎';
        btn.title = '编辑模式';
        renderCategories();
        renderBookmarks();
        showToast('已退出编辑模式');
      } else {
        showPasswordModal();
      }
    }
  });

  document.querySelectorAll('.modal-overlay').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target === el) { el.classList.remove('show'); confirmCallback = null; }
    });
  });

  document.getElementById('editToggleBtn').style.display = 'none';
  document.getElementById('loginSidebarBtn').style.display = '';
  
  // 页面加载时初始化
  (async function init() {
    console.log('🚀 应用启动中...');
    
    // 立即初始化 Supabase
    initSupabase();
    
    // 先从云端加载数据
    try {
      console.log('📥 从云端加载数据...');
      await getDb();
      console.log('✅ 数据加载完成');
    } catch (e) {
      console.error('❌ 数据加载失败:', e);
    }
    
    // 检查是否有保存的登录状态，有则自动登录
    try {
      const savedUser = localStorage.getItem('currentUser');
      const db = getDbSync();
      if (savedUser && db.users[savedUser]) {
        console.log('🔐 自动登录用户:', savedUser);
        // 先加载用户数据
        await loadUserData(savedUser);
        state.currentUser = savedUser;
        // 然后执行登录后操作
        afterLogin();
        // 最后确保渲染
        renderCategories();
        renderBookmarks();
        updateMainTitle();
        showToast('已自动登录');
        console.log('✅ 自动登录完成');
        return;
      }
    } catch (e) {
      console.error('❌ 自动登录失败:', e);
    }
    
    // 如果没有保存的登录状态或自动登录失败，则显示登录弹窗
    console.log('👋 显示登录弹窗');
    renderCategories(); // 先渲染空状态
    showPasswordModal();
  })();
</script>
